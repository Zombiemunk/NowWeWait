name: Android CI/CD Build APK

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Android SDK 36 and accept licenses
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" "platforms;android-36" 2>/dev/null || true
          yes | "$SDKMANAGER" --licenses 2>/dev/null || true

      - name: Make Gradlew Executable
        run: |
          sed -i 's/\r$//' android/gradlew
          chmod +x android/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: android

      - name: Copy Built APK to builds folder
        run: |
          mkdir -p builds
          cp android/app/build/outputs/apk/debug/app-debug.apk builds/nowwewait-v1.0-debug.apk

      - name: Commit and Push Updated APK
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add builds/nowwewait-v1.0-debug.apk
          if git diff --staged --quiet; then
            echo "No changes in compiled APK. Skipping commit."
          else
            git commit -m "chore: Automatic CI/CD build update [skip ci]"
            git push origin main
          fi
